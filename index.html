<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G9 Motos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  border-bottom: 2px solid #FFD700;
}

header img {
  height: 55px;
}

nav a {
  color: #FFD700;
  margin-left: 20px;
  text-decoration: none;
  font-weight: bold;
}

.banner {
  height: 450px;
  background: url('https://images.unsplash.com/photo-1558981806-ec527fa84c39') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.banner h1 {
  font-size: 60px;
  color: #FFD700;
}

.banner p {
  margin: 10px 0;
}

.btn {
  background: #FFD700;
  color: #000;
  padding: 12px 25px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
}

.info {
  text-align: center;
  padding: 20px;
}

.info a {
  color: #FFD700;
  margin: 0 10px;
}

#busca {
  width: 80%;
  padding: 10px;
  margin: 20px auto;
  display: block;
  border-radius: 5px;
  border: none;
}

.motos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
  border: 1px solid #FFD700;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.whatsapp {
  display: inline-block;
  margin-top: 10px;
  background: #25D366;
  color: #fff;
  padding: 10px;
  text-decoration: none;
  border-radius: 5px;
}
</style>

</head>

<body>

<header>
  <img src="logo.png" alt="Logo">
  <nav>
    <a href="#">Início</a>
    <a href="#motos">Motos</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<section class="banner">
  <div>
    <h1>G9 MOTOS</h1>
    <p>As melhores motos com procedência e garantia</p>
    <a href="https://wa.me/5511915629892" class="btn">Falar no WhatsApp</a>
  </div>
</section>

<section class="info">
  <a href="https://www.instagram.com/g9.motos" target="_blank">Instagram</a>
  <a href="https://maps.google.com" target="_blank">Localização</a>
</section>

<input type="text" id="busca" placeholder="Buscar moto...">

<section id="motos" class="motos"></section>

<script>
const motos = [
  {
    nome: "Honda Fan 160",
    preco: "R$ 13.900",
    imagem: "https://images.unsplash.com/photo-1580310614729-ccd69652491d"
  },
  {
    nome: "Yamaha Fazer 250",
    preco: "R$ 18.500",
    imagem: "https://images.unsplash.com/photo-1609630875171-b1321377ee65"
  }
];

const container = document.querySelector(".motos");
const busca = document.getElementById("busca");

function mostrarMotos(lista) {
  container.innerHTML = "";

  lista.forEach(moto => {
    container.innerHTML += `
      <div class="card">
        <img src="${moto.imagem}">
        <h3>${moto.nome}</h3>
        <p>${moto.preco}</p>
        <a class="whatsapp" 
        href="https://wa.me/5511915629892?text=Tenho interesse na ${moto.nome}">
        Tenho interesse
        </a>
      </div>
    `;
  });
}

busca.addEventListener("input", () => {
  const valor = busca.value.toLowerCase();
  const filtrado = motos.filter(m => m.nome.toLowerCase().includes(valor));
  mostrarMotos(filtrado);
});

mostrarMotos(motos);
</script>

</body>
</html>
